<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ブロック崩し</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }
    h1 {
      margin-bottom: 12px;
      font-size: 1.6rem;
      letter-spacing: 0.1em;
      color: #e0e0ff;
    }
    #hud {
      display: flex;
      gap: 40px;
      margin-bottom: 10px;
      font-size: 1rem;
    }
    canvas {
      background: #0f0f23;
      border: 2px solid #4444aa;
      border-radius: 4px;
      display: block;
    }
    #message {
      margin-top: 14px;
      font-size: 1.1rem;
      height: 1.4em;
      color: #aaf;
    }
    #start-hint {
      margin-top: 6px;
      font-size: 0.85rem;
      color: #777;
    }
  </style>
</head>
<body>
  <h1>ブロック崩し</h1>
  <div id="hud">
    <span>スコア: <strong id="score">0</strong></span>
    <span>ライフ: <strong id="lives">3</strong></span>
    <span>レベル: <strong id="level">1</strong></span>
  </div>
  <canvas id="canvas" width="480" height="400"></canvas>
  <div id="message">スペースキーまたはクリックでスタート</div>
  <div id="start-hint">← → キーまたはマウスでパドルを操作</div>
  <script src="main.js"></script>
</body>
</html>
